name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_KEY: test
      OPENROUTER_API_KEY: test
      OPENROUTER_MODEL: test
      DOCKER_REGISTRY: test
      DOCKER_REGISTRY_PUSH_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" && pip install openapi-spec-validator

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_analyzer_eval.py \
            --ignore=tests/test_generator_eval.py \
            --ignore=tests/test_full_eval.py \
            --ignore=tests/test_extractor_eval.py \
            --ignore=tests/e2e/ \
            -v
