openapi: "3.0.3"
info:
  title: GitHub API (Subset)
  description: A subset of the GitHub REST API for testing MCP server generation
  version: "2024-01-01"
servers:
  - url: https://api.github.com
paths:
  /user:
    get:
      tags: [users]
      summary: Get the authenticated user
      operationId: getAuthenticatedUser
      responses:
        '200':
          description: Authenticated user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
        - bearer: []
  /users/{username}:
    get:
      tags: [users]
      summary: Get a user by username
      operationId: getUserByUsername
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /user/repos:
    get:
      tags: [repos]
      summary: List repositories for the authenticated user
      operationId: listMyRepos
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            enum: [created, updated, pushed, full_name]
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Repository'
      security:
        - bearer: []
  /repos/{owner}/{repo}:
    get:
      tags: [repos]
      summary: Get a repository
      operationId: getRepo
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Repository details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'
  /repos/{owner}/{repo}/issues:
    get:
      tags: [issues]
      summary: List repository issues
      operationId: listRepoIssues
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [open, closed, all]
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: List of issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Issue'
    post:
      tags: [issues]
      summary: Create an issue
      operationId: createIssue
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                body:
                  type: string
                labels:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Created issue
      security:
        - bearer: []
  /search/repositories:
    get:
      tags: [search]
      summary: Search repositories
      operationId: searchRepos
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [stars, forks, updated]
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_count:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Repository'
components:
  schemas:
    User:
      type: object
      properties:
        login:
          type: string
        id:
          type: integer
        name:
          type: string
        bio:
          type: string
        public_repos:
          type: integer
        followers:
          type: integer
        following:
          type: integer
    Repository:
      type: object
      properties:
        full_name:
          type: string
        description:
          type: string
        html_url:
          type: string
        stargazers_count:
          type: integer
        language:
          type: string
        open_issues_count:
          type: integer
    Issue:
      type: object
      properties:
        number:
          type: integer
        title:
          type: string
        state:
          type: string
        body:
          type: string
        user:
          type: object
          properties:
            login:
              type: string
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
